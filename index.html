<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela de login</title>
    <link rel="stylesheet" href="estilo.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <section class="caixa">
      <img class="imagem-logo" src="img/googlelogo_color_160x56dp.png" alt="" />
      <h1 class="text">Fazer login</h1>
      <h3 id="email" class="text">Ir para o Gmail</h3>
      <div class="user-name">
        <input
          class="caixa-email"
          type="text"
          placeholder="E-mail ou telefone"
        />
        <nav> <a class="reset-email" href=""> Esqueceu seu e-mail? </a></nav>
        <p>
          Não está no seu computador? Use o modo visitante para fazer login com privacidade. <a class="saiba-mais" href=""> Saiba mais </a>
        </p>
      </div>

      <div class="botoes">
        <button class="botao-conta">Criar conta</button>
        <button class="bota-proximo">Próxima</button>
      </div>
    </section>
  </body>
  <footer></footer>
</html>
